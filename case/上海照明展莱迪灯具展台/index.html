</header><div class="case-detail"><h1 style="text-align:center;">上海照明展莱迪灯具展台</h1><div class="showcase-dynamic-area"><div class="dynamic-row single-col"><div class="dynamic-item"><div class="dynamic-media-container"><img src="./%E4%B8%8A%E6%B5%B7%E7%85%A7%E6%98%8E%E5%B1%95%E8%8E%B1%E8%BF%AA%E7%81%AF%E5%85%B7%E5%B1%95%E5%8F%B0.jpg" alt="" loading="lazy"></div></div></div><div class="dynamic-row text-row"><div class="text-content">
<span class="text-center">主视觉设计一些翻页暗发光灯效果，翻动起来吸引眼球</span>
</div></div><div class="dynamic-row single-col"><div class="dynamic-item"><div class="dynamic-media-container"><img src="./222.jpg" alt="" loading="lazy"></div></div></div></div><div class="media-grid-container"><h3>Creative elements</h3><div class="media-grid" id="creativeGrid"><div class="media-item"><img src="./%E5%B9%B3%E9%9D%A2%E5%9B%BE.jpg" alt="" loading="lazy"></div></div></div><a href="/" class="back-link">← 返回首页</a></div><footer><p>© 2025 艺展天下会展服务有限公司 版权所有  上海市嘉定区金沙江西路1069弄5号写字楼907</p></footer><script>
(function() {
  // 为 Creative elements 区域的所有图片添加点击放大功能
  function initLightbox() {
    const mediaGrid = document.getElementById('creativeGrid');
    if (!mediaGrid) return;
    const images = mediaGrid.querySelectorAll('.media-item img');
    if (images.length === 0) return;
    
    // 创建遮罩层
    const overlay = document.createElement('div');
    overlay.className = 'lightbox-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:10000;cursor:pointer;opacity:0;transition:opacity 0.3s ease;pointer-events:none;';
    const imgElement = document.createElement('img');
    imgElement.className = 'lightbox-image';
    imgElement.style.cssText = 'max-width:90vw;max-height:90vh;object-fit:contain;';
    overlay.appendChild(imgElement);
    document.body.appendChild(overlay);
    
    function showLightbox(src) {
      imgElement.src = src;
      overlay.style.opacity = '1';
      overlay.style.pointerEvents = 'auto';
    }
    function hideLightbox() {
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
      setTimeout(() => { imgElement.src = ''; }, 300);
    }
    overlay.addEventListener('click', hideLightbox);
    // 避免图片点击冒泡导致同时触发展示和隐藏
    images.forEach(img => {
      img.addEventListener('click', (e) => {
        e.stopPropagation();
        showLightbox(img.src);
      });
    });
    // ESC键关闭
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.style.pointerEvents === 'auto') {
        hideLightbox();
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initLightbox);
  } else {
    initLightbox();
  }
})();
</script></body></html>
